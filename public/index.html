<!doctype html>
<html lang="BN" content="notranslate">
<head>
    <meta charset="utf-8"/>
    <meta name="google" content="notranslate"/>
    <meta name="theme-color" content="#062229"/>
    <meta name="viewport" content="viewport-fit=cover,width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no"/>
    
    <title>CTH999.COM | ক্যাসিনো, স্লটস ও লাইভ গেমিং বাংলাদেশ</title>
    <meta name="description" content="CTH999.COM বাংলাদেশের সবচেয়ে নিরাপদ ও প্রফেশনাল গেমিং প্ল্যাটফর্ম।"/>
    
    <link rel="shortcut icon" href="https://i.ibb.co.com/VY2bYFyM/file-000000008c0471fabea995621a1e9d56.png"/>
    
    <style>
        :root { 
            --vh: 1vh; 
            --primary-teal: #00ffcc; 
            --bg-dark-teal: #062229; 
            --card-bg: #09343f;
            --btn-yellow: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background-color: var(--bg-dark-teal); 
            color: #fff; 
            min-height: calc(var(--vh) * 100);
            display: flex; flex-direction: column;
            padding-bottom: 70px; /* বটম বারের জন্য জায়গা */
            overflow-x: hidden;
        }

        /* প্রফেশনাল হেডার (স্ক্রিনশটের মতো লিনিয়ার ডিজাইন) */
        header {
            width: 100%; background: #04191f; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #0d4654; position: sticky; top: 0; z-index: 100;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; } 
        .logo-text { font-size: 20px; font-weight: bold; color: var(--primary-teal); }
        
        .auth-btns button { padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .login-btn { background: #0e3d47; color: #fff; margin-right: 8px; border: 1px solid #1c6373 !important; }
        .reg-btn { background: linear-gradient(180deg, #ffe600, #cc9900); color: #000; }

        /* হিরো ব্যানার */
        .hero-banner { width: 100%; max-width: 1200px; margin: 12px auto; padding: 0 12px; }
        .banner-box {
            width: 100%; height: 160px; border-radius: 10px;
            background-image: url('https://i.ibb.co.com/m5Pyh1N2/file-00000000321c7206a4ea020cb2c74b11.png');
            background-size: cover; background-position: center;
            border: 1px solid #0d4654;
        }

        /* জ্যাকপট ডিসপ্লে বার */
        .jackpot-container {
            background: #04161a; border-radius: 8px; margin: 15px 12px; padding: 12px;
            text-align: center; border: 1px dashed var(--primary-teal);
        }
        .jackpot-title { color: #ffcc00; font-size: 20px; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
        .jackpot-counter { display: inline-flex; gap: 4px; font-size: 22px; font-weight: bold; color: #fff; background: #111; padding: 6px 12px; border-radius: 4px; border: 1px solid #222; font-family: monospace; }

        /* ক্যাটাগরি কন্টেইনার */
        .main-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 12px; flex: 1; }
        
        .section-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin: 20px 0 10px 0; border-left: 4px solid var(--primary-teal); padding-left: 8px; 
        }
        .section-title { font-size: 16px; font-weight: bold; color: var(--primary-teal); text-transform: uppercase; }
        .see-all { font-size: 12px; color: #999; cursor: pointer; background: #0a353f; padding: 3px 8px; border-radius: 4px; }
        
        /* গেম গ্রিড (স্ক্রিনশটের ৩ কলাম বিন্যাস) */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-card { 
            background: var(--card-bg); border-radius: 8px; overflow: hidden; 
            border: 1px solid #0d4654; position: relative; display: flex; flex-direction: column;
        }
        .game-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .game-info { padding: 6px; text-align: center; font-size: 11px; font-weight: bold; color: #fff; background: rgba(4, 25, 31, 0.9); }

        /* 📱 ফিক্সড বটম নেভিগেশন বার (স্ক্রিনশটের হুবহু ডিজাইন) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            background: #031418; border-top: 1px solid #0d4654;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #8da1a5; font-size: 11px; font-weight: 600; text-decoration: none; cursor: pointer;
        }
        .nav-item.active { color: var(--primary-teal); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }

        /* সেন্ট্রাল ইনভাইট বাটন স্পেশাল স্টাইল */
        .nav-item-center {
            background: linear-gradient(180deg, #00ffcc, #009977);
            width: 44px; height: 44px; border-radius: 50%;
            justify-content: center; color: #fff !important;
            box-shadow: 0 0 10px rgba(0,255,204,0.4); transform: translateY(-8px);
        }
        .nav-item-center .nav-icon { margin-bottom: 0; font-size: 22px; }

        /* পপ-আপ মডাল */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: #09343f; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; 
            border: 1px solid var(--primary-teal); position: relative;
        }
        .close-btn { position: absolute; top: 12px; right: 18px; font-size: 22px; cursor: pointer; color: #aaa; }
        .modal h2 { margin-bottom: 15px; color: var(--primary-teal); text-align: center; font-size: 18px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 13px; color: #ccc; }
        .form-group input { width: 100%; padding: 10px; background: #04191f; border: 1px solid #1c6373; border-radius: 6px; color: #fff; font-size: 14px; }
        .form-group input:focus { border-color: var(--primary-teal); outline: none; }
        .submit-btn { width: 100%; padding: 12px; background: linear-gradient(180deg, #ffe600, #cc9900); border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img class="logo-img" src="https://i.ibb.co.com/VY2bYFyM/file-000000008c0471fabea995621a1e9d56.png" alt="Logo">
            <div class="logo-text">CTH999.COM</div>
        </div>
        <div class="auth-btns">
            <button class="login-btn" onclick="openModal('loginModal')">Login</button>
            <button class="reg-btn" onclick="openModal('regModal')">Register</button>
        </div>
    </header>

    <div class="hero-banner">
        <div class="banner-box"></div>
    </div>

    <div class="jackpot-container">
        <div class="jackpot-title">🎰 Mega Jackpot 🎰</div>
        <div class="jackpot-counter" id="jackpotBox">$102,678,159.00</div>
    </div>

    <main class="main-container" id="dynamicSections">
        </main>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="changeTab('home')">
            <div class="nav-icon">🏠</div>
            <div>Home</div>
        </div>
        <div class="nav-item" onclick="alert('প্রমোশন পেজ ডেমো')">
            <div class="nav-icon">🎁</div>
            <div>Promotion</div>
        </div>
        <div class="nav-item nav-item-center" onclick="alert('রেফারেল ও ইনভাইট লিংক ডেমো')">
            <div class="nav-icon">🔗</div>
        </div>
        <div class="nav-item" onclick="alert('ডেইলি রিওয়ার্ডস ডেমো')">
            <div class="nav-icon">🏆</div>
            <div>Reward</div>
        </div>
        <div class="nav-item" onclick="openModal('loginModal')">
            <div class="nav-icon">👤</div>
            <div>Member</div>
        </div>
    </div>

    <div id="regModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('regModal')">&times;</span>
            <h2>Create New Account</h2>
            <form onsubmit="handleAuth(event, 'Registration')">
                <div class="form-group"><label>Username</label><input type="text" placeholder="Username" required></div>
                <div class="form-group"><label>Password</label><input type="password" placeholder="Password" required></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" placeholder="01XXXXXXXXX" required></div>
                <button type="submit" class="submit-btn">Register</button>
            </form>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('loginModal')">&times;</span>
            <h2>Account Login</h2>
            <form onsubmit="handleAuth(event, 'Login')">
                <div class="form-group"><label>Username / Phone</label><input type="text" required></div>
                <div class="form-group"><label>Password</label><input type="password" required></div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
        </div>
    </div>

    <script>
        !function(){if(!CSS.supports("height","1dvh")){var e=.01*window.innerHeight,t=document.documentElement,n=e+"px";t.style.getPropertyValue("--vh")!==n&&t.style.setProperty("--vh",n)}}();

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function handleAuth(event, type) {
            event.preventDefault();
            alert(type + ' successful! (Educational Demo Mode)');
            closeModal('regModal'); closeModal('loginModal');
        }

        // জ্যাকপট নাম্বার ডাইনামিকালি চেঞ্জ হওয়ার ডেমো ইফেক্ট
        setInterval(() => {
            let num = Math.floor(100000000 + Math.random() * 90000000);
            document.getElementById('jackpotBox').innerText = "$" + num.toLocaleString() + ".99";
        }, 3000);

        // API থেকে স্ট্রাকচার্ড ডাটা লোড করা
        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/loadMemberCenter')
                .then(res => res.json())
                .then(data => {
                    const mainContainer = document.getElementById('dynamicSections');
                    let finalHTML = '';

                    // প্রতিটি ক্যাটাগরি লুপ করে সেকশন তৈরি করা (Hot, Sports, Live, Fish etc)
                    data.categories.forEach(cat => {
                        let gameCardsHTML = '';
                        cat.list.forEach(game => {
                            gameCardsHTML += `
                                <div class="game-card" onclick="alert('${game.name} গেমটি চালু হচ্ছে...')">
                                    <img class="game-img" src="${game.image}" alt="${game.name}">
                                    <div class="game-info">${game.name}</div>
                                </div>
                            `;
                        });

                        finalHTML += `
                            <div class="section-header">
                                <div class="section-title">${cat.title}</div>
                                <div class="see-all">See All (${cat.list.length})</div>
                            </div>
                            <div class="game-grid">${gameCardsHTML}</div>
                        `;
                    });

                    mainContainer.innerHTML = finalHTML;
                })
                .catch(err => console.error("ডাটা রেন্ডারিং এরর:", err));
        });
    </script>
</body>
</html>
